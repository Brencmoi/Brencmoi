<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATTENTION_PIRATAGE</title>
    <style>
        /* Styles globaux */
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Courier New", Courier, monospace;
            overflow-x: hidden;
            background-color: black;
            text-align: center;
        }

        /* --- ÉTAPE 1 : LE TERMINAL DE HACKING --- */
        #hacker-screen {
            background-color: black;
            color: #00FF00;
            padding: 5vw;
            font-size: clamp(1rem, 4vw, 1.5rem);
            text-align: left;
            min-height: 100vh;
        }
        #console {
            word-wrap: break-word;
        }
        p {
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .cursor {
            animation: blink 1s infinite;
            font-weight: bold;
        }
        .error-text {
            color: red;
            font-weight: bold;
        }
        .device-text {
            color: #00FFFF; /* Cyan pour faire ressortir les infos */
            font-weight: bold;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Le bouton de rançon */
        #btn-rancon {
            display: none;
            margin-top: 30px;
            background-color: red;
            color: white;
            border: 2px solid darkred;
            padding: 15px 30px;
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            animation: pulse 1s infinite;
            width: 100%;
            max-width: 400px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- ÉTAPE 2 : LA PAGE DE RANÇON / ANNIVERSAIRE --- */
        #birthday-screen {
            display: none;
            background-color: #ff0055;
            color: white;
            padding: 5vw;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .hidden-at-start {
            display: none !important;
        }
        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        h2 {
            font-size: clamp(1.5rem, 6vw, 3rem);
            color: #ffff00;
            margin-top: 0;
        }
        .ransom-text {
            font-size: clamp(1rem, 4vw, 1.5rem);
            background: black;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 3px dashed yellow;
        }
        .gif-container {
            width: 100%;
            max-width: 500px;
        }
        .gif-container img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <!-- Écran de piratage -->
    <div id="hacker-screen">
        <div id="console"></div>
        <span class="cursor" id="cursor">_</span>
        <center>
            <button id="btn-rancon" onclick="montrerRancon()">AFFICHER LA DEMANDE DE RANÇON</button>
        </center>
    </div>

    <!-- Écran d'anniversaire -->
    <div id="birthday-screen" class="hidden-at-start">
        <h1>Bonne znniverssaire Laëtitia !!!</h1>
        <h2>41 ANS !</h2>
        
        <div class="ransom-text">
            ⚠️ <strong>VOTRE SYSTÈME EST BLOQUÉ</strong> ⚠️<br><br>
            Pour récupérer l'accès à vos données, une rançon est exigée immédiatement :<br>
            <strong>1 énorme part de gâteau et faire la fête jusqu'au bout de la nuit !</strong> 🥳🥂
        </div>

        <audio id="audio-player" src="musique.mp3" loop></audio>

        <div class="gif-container">
            <img src="https://media.giphy.com/media/3o7TKMt1VVNkHV2PaE/giphy.gif" alt="Fête !">
        </div>
    </div>

    <script>
        // --- 1. DÉTECTION DU TÉLÉPHONE / APPAREIL ---
        let appareil = "Appareil non identifié";
        const ua = navigator.userAgent;
        
        if (/iPhone/i.test(ua)) {
            appareil = "Apple iPhone";
        } else if (/iPad/i.test(ua)) {
            appareil = "Apple iPad";
        } else if (/Android/i.test(ua)) {
            const match = ua.match(/Android.*?; (.*?) Build/i) || ua.match(/Android.*?; (.*?)\)/i);
            appareil = match ? match[1] + " (Android)" : "Smartphone Android";
        } else if (/Windows NT/i.test(ua)) {
            appareil = "Ordinateur Windows";
        } else if (/Macintosh/i.test(ua)) {
            appareil = "Apple Mac";
        }

        // --- 2. DÉTECTION DE L'OPÉRATEUR VIA API ---
        let operateur = "Réseau crypté";
        // On interroge discrètement un service en arrière-plan dès le chargement de la page
        fetch('https://ipwho.is/')
            .then(response => response.json())
            .then(data => {
                if (data.connection && data.connection.isp) {
                    operateur = data.connection.isp; // Ex: "Orange", "Societe Francaise Du Radiotelephone - SFR"
                }
            })
            .catch(() => console.log("Erreur discrète"));

        // --- 3. TEXTES DU PIRATAGE (Dynamiques) ---
        // On utilise une fonction pour être sûr de récupérer le nom de l'opérateur 
        // une fois que la recherche internet (qui prend une fraction de seconde) est terminée.
        function getMessage(index) {
            const messages = [
                "Lancement du protocole d'intrusion...",
                "Contournement des pare-feux locaux...",
                "Interception des données chez : <span class='device-text'>[" + operateur + "]</span>...",
                "Appareil ciblé : <span class='device-text'>[" + appareil + "]</span>...",
                "Ciblage de la victime : LAËTITIA...",
                "Scan biométrique : 41 ans détectés...",
                "Recherche de statut : En couple avec...",
                "<span class='error-text'>[ ERREUR SYSTEME ]</span>",
                "Analyse des dossiers compromettants...",
                "Téléchargement des photos dossiers : 100%",
                "ATTENTION : APPAREIL COMPROMIS !",
                "Verrouillage du système en cours..."
            ];
            return messages[index];
        }

        const consoleDiv = document.getElementById("console");
        let msgIndex = 0;
        const totalMessages = 12;

        function typeMessage() {
            if (msgIndex < totalMessages) {
                const p = document.createElement("p");
                p.innerHTML = "> " + getMessage(msgIndex);
                consoleDiv.appendChild(p);
                msgIndex++;
                
                // Timing ajusté
                let delay = 800 + Math.random() * 800;
                if (msgIndex === 3) delay = 1500; // Pause après l'opérateur
                if (msgIndex === 4) delay = 1500; // Pause après l'appareil
                if (msgIndex === 8) delay = 2000; // Pause après l'erreur

                setTimeout(typeMessage, delay); 
            } else {
                document.getElementById("btn-rancon").style.display = "inline-block";
                document.getElementById("cursor").style.display = "none";
            }
        }

        setTimeout(typeMessage, 1000);

        function montrerRancon() {
            document.getElementById("hacker-screen").style.display = "none";
            
            const birthdayScreen = document.getElementById("birthday-screen");
            birthdayScreen.classList.remove("hidden-at-start");
            birthdayScreen.style.display = "flex";

            const audio = document.getElementById("audio-player");
            audio.play();
        }
    </script>
</body>
</html>
