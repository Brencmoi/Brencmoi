<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal_Hacker.exe</title>
    <style>
        body {
            background-color: black;
            color: #00FF00;
            font-family: "Courier New", Courier, monospace;
            /* Padding dynamique qui s'adapte à la taille de l'écran */
            padding: 5vw; 
            /* Taille de police responsive : minimum 1rem, s'adapte à l'écran, maximum 1.5rem */
            font-size: clamp(1rem, 4vw, 1.5rem); 
            overflow-x: hidden;
            margin: 0;
            box-sizing: border-box;
        }
        #console {
            /* Empêche les mots trop longs de dépasser sur mobile */
            word-wrap: break-word; 
        }
        p {
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .cursor {
            animation: blink 1s infinite;
            font-weight: bold;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="console"></div>
    <span class="cursor">_</span>

    <script>
        const messages = [
            "Initialisation du script de piratage...",
            "Contournement du pare-feu principal...",
            "Accès au système sécurisé...",
            "Analyse des données en cours...",
            "ATTENTION : Détection d'une activité anormale...",
            "Téléchargement des recettes secrètes de grand-mère...",
            "Piratage de la machine à café terminé à 100% ☕",
            "Mission accomplie. Vous avez été hacké ! 😎"
        ];

        const consoleDiv = document.getElementById("console");
        let msgIndex = 0;

        function typeMessage() {
            if (msgIndex < messages.length) {
                const p = document.createElement("p");
                p.textContent = "> " + messages[msgIndex];
                consoleDiv.appendChild(p);
                msgIndex++;
                setTimeout(typeMessage, 1500 + Math.random() * 1000); 
            }
        }

        setTimeout(typeMessage, 1000);
    </script>
</body>
</html>
